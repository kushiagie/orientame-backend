        const fetchWithRetry = async (url, options, retries = 5, delay = 1000) => {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(res => setTimeout(res, delay * Math.pow(2, i)));
                }
            }
        };

        // --- FUNCIÓN HELPER PARA EXTRACCIÓN SEGURA DE JSON ---
        const extractJSON = (text) => {
            const bt = String.fromCharCode(96, 96, 96);
            let cleanText = text.replace(new RegExp(bt + '(?:json)?', 'gi'), '').replace(new RegExp(bt, 'g'), '').trim();
            const startIdx = cleanText.indexOf('{');
            const endIdx = cleanText.lastIndexOf('}');
            if (startIdx !== -1 && endIdx !== -1) {
                return cleanText.substring(startIdx, endIdx + 1);
            }
            return cleanText;
        };

            { id: "ciencias_politicas", name: "Ciencias Políticas y Administración Pública", whatItDoes: "Analizan el poder, crean campañas electorales, asesoran gobernantes y diseñan las leyes y políticas públicas de una nación.", salaries: { mexico: "$20,000 MXN/mes promedio" }, pros: ["Entiendes cómo se mueve el poder real y la sociedad.", "Posibilidad de tener un gran impacto nacional si llegas alto.", "Carrera dinámica (análisis de encuestas, debates, medios de comunicación)."], cons: ["El sector público (gobierno) puede ser muy inestable o corrupto.", "A veces tu empleo depende de qué partido político esté en el poder.", "Es una carrera donde los contactos importan más que en otras."], areaCategory: "Humanidades", areaColor: "border-purple-500", icon: "landmark" },
            { id: "contaduria", name: "Contaduría Pública y Finanzas", whatItDoes: "Registran, auditan y proyectan los números y el dinero de una empresa, asegurando el pago correcto de impuestos y detectando fraudes.", salaries: { mexico: "$22,000 MXN/mes promedio" }, pros: ["Toda empresa formal y persona física con negocio necesita un contador.", "Gran estabilidad laboral y oportunidad de ser consultor independiente.", "Alta demanda de auditores forenses."], cons: ["Épocas de estrés brutal (ej. declaración anual de impuestos en abril).", "La ley fiscal cambia constantemente y debes actualizarte sin parar.", "Trabajo de oficina altamente repetitivo y sedentario."], areaCategory: "Administración", areaColor: "border-orange-500", icon: "calculator" },
            { id: "criminologia", name: "Criminología y Criminalística", whatItDoes: "Estudian el porqué del crimen (psicología del asesino) o aplican ciencia forense (balística, dactiloscopia) en la escena del delito para resolverlo.", salaries: { mexico: "$16,000 MXN/mes promedio" }, pros: ["Carrera increíblemente fascinante e intrigante (como las series de TV).", "Combinación interesante de psicología, derecho y ciencias forenses.", "Crucial para la justicia y prevención del delito en la sociedad."], cons: ["Campo laboral restringido principalmente al gobierno y fiscalías.", "Contacto frecuente con escenas trágicas, cadáveres y violencia.", "El sistema de justicia real suele ser frustrante, peligroso y burocrático."], areaCategory: "Humanidades", areaColor: "border-purple-500", icon: "search" },
            { id: "derecho", name: "Derecho / Abogado", whatItDoes: "Asesoran, representan y defienden a personas o empresas corporativas en procesos legales. Redactan contratos, negocian disputas y litigan en los tribunales.", salaries: { mexico: "$25,000 MXN/mes promedio" }, pros: ["Alto prestigio social e intelectual.", "Excelente potencial económico, especialmente en área corporativa o fiscal.", "Gran variedad de ramas (penal, civil, tecnología, familiar)."], cons: ["Niveles altísimos de estrés, litigios largos y mucha presión.", "Requiere lectura extrema diaria y excelente memoria.", "Mucha competencia y burocracia pesada en los juzgados."], areaCategory: "Humanidades", areaColor: "border-purple-500", icon: "scale" },
            { id: "diseno_grafico", name: "Diseño Gráfico / UX UI", whatItDoes: "Solucionan problemas de comunicación visual. Crean marcas, empaques, publicidad, y diseñan las interfaces digitales de las apps y páginas web.", salaries: { mexico: "$18,000 MXN/mes promedio" }, pros: ["Trabajo muy creativo, visual y divertido.", "La rama de UX/UI (Diseño de apps) tiene sueldos extremadamente altos.", "Facilidad inmensa para trabajar remoto o como Freelancer."], cons: ["Sector tradicional (imprenta, editorial) muy mal pagado.", "Clientes difíciles que piden 'cambios infinitos' y no valoran el arte.", "Presión constante para dominar nuevos softwares de Adobe y Figma."], areaCategory: "Humanidades", areaColor: "border-purple-500", icon: "pen-tool" },
            { id: "docencia", name: "Docencia y Pedagogía", whatItDoes: "Diseñan planes educativos, metodologías de aprendizaje y transmiten conocimientos frente a grupos desde preescolar hasta universidad.", salaries: { mexico: "$15,000 MXN/mes promedio" }, pros: ["Impacto directo y hermoso en la formación de nuevas generaciones.", "Periodos vacacionales largos comparados con otras profesiones.", "Carrera de profunda vocación y satisfaction espiritual."], cons: ["Salarios históricamente bajos en relación al esfuerzo físico y mental.", "Lidiar con padres de familia conflictivos y burocracia escolar.", "Agotamiento mental por la preparación de clases y calificación de exámenes en casa."], areaCategory: "Humanidades", areaColor: "border-purple-500", icon: "book" },
            { id: "economia", name: "Economía", whatItDoes: "Analizan cómo se produce, distribuye y consume la riqueza. Predicen inflación, crisis y asesoran gobiernos o corporativos multinacionales.", salaries: { mexico: "$25,000 MXN/mes promedio" }, pros: ["Entiendes cómo funciona el mundo y el dinero a gran escala.", "Puedes trabajar en el Banco Central, gobierno o finanzas corporativas.", "Gran prestigio intelectual y capacidad de influencia."], cons: ["Muy pesada en matemáticas, econometría y estadística.", "Es teórica; a veces cuesta encontrar el primer empleo práctico.", "Estarás expuesto a críticas por políticas o pronósticos que fallen."], areaCategory: "Administración", areaColor: "border-orange-500", icon: "bar-chart" },
            { id: "enfermeria", name: "Enfermería", whatItDoes: "Brindan el cuidado directo e ininterrumpido al paciente en hospitales, administrando medicamentos, curando heridas y monitoreando signos vitales.", salaries: { mexico: "$14,000 MXN/mes promedio" }, pros: ["Empleo 100% garantizado en todo el mundo.", "Es la columna vertebral del hospital; contacto humano profundo.", "Alta movilidad internacional (muy solicitados en EE.UU. y Europa)."], cons: ["Salarios injustamente bajos para la enorme carga de trabajo en México.", "Agotamiento físico brutal y turnos nocturnos rotativos pesados.", "Exposición directa a fluidos, infecciones y la muerte constante."], areaCategory: "Biológicas", areaColor: "border-emerald-500", icon: "activity" },
            { id: "fisica", name: "Física / Astrofísica", whatItDoes: "Estudian las leyes fundamentales del universo, desde partículas subatómicas hasta galaxias, desarrollando tecnología cuántica, óptica y acústica.", salaries: { mexico: "$20,000 MXN/mes promedio" }, pros: ["Carrera fascinante para mentes curiosas que quieren entender el universo.", "Habilidades matemáticas que te permiten saltar a Ciencia de Datos fácilmente.", "Colaboración en proyectos internacionales (telescopios, colisionadores)."], cons: ["Pocas opciones en la industria privada; muy enfocada a la academia/investigación.", "Requiere Doctorado (muchos años) para destacar e investigar.", "Las matemáticas y la abstracción mental requerida son colosales."], areaCategory: "Exactas", areaColor: "border-blue-500", icon: "star" },
            { id: "fisioterapia", name: "Fisioterapia y Rehabilitación", whatItDoes: "Restauran la movilidad y quitan el dolor físico de pacientes con lesiones deportivas, derrames cerebrales, amputaciones o fracturas graves.", salaries: { mexico: "$15,000 MXN/mes promedio" }, pros: ["Trato muy humano y ves los resultados físicos de tu trabajo en semanas.", "Independencia altísima; es muy fácil tener consulta privada.", "Alta demanda por el envejecimiento de la población y deporte."], cons: ["Trabajo físico muy pesado; pasas el día cargando, estirando y dando masajes.", "Sueldos bajos en hospitales y clínicas públicas.", "Riesgo de lesiones en tus propias manos o espalda."], areaCategory: "Biológicas", areaColor: "border-emerald-500", icon: "activity" },
            { id: "gastronomia", name: "Gastronomía y Alta Cocina", whatItDoes: "Dominan la química de los alimentos y técnicas culinarias para dirigir cocinas de restaurantes, diseñar menús y administrar negocios de comida.", salaries: { mexico: "$14,000 MXN/mes promedio" }, pros: ["Carrera 100% práctica y apasionante para los amantes de la comida.", "Gran libertad para el emprendimiento personal.", "Puedes expresar tu arte a través de los platillos."], cons: ["La carrera y los insumos escolares son muy caros.", "Ambiente de cocina real de extrema presión, calor, gritos y cortes físicos.", "Largas y duras jornadas laborales de pie durante días festivos."], areaCategory: "Administración", areaColor: "border-orange-500", icon: "utensils" },
            { id: "historia", name: "Historia y Gestión Cultural", whatItDoes: "Investigan el pasado de la humanidad, preservan el patrimonio en museos y analizan cómo los eventos históricos moldean nuestro presente.", salaries: { mexico: "$14,000 MXN/mes promedio" }, pros: ["Trabajo apasionante para amantes de la lectura y la cultura.", "Puedes trabajar en museos, archivos históricos o turismo cultural.", "Desarrolla un nivel cultural e intelectual muy alto."], cons: ["Campo laboral en el sector público muy limitado y competido.", "Sueldos iniciales bajos a menos que llegues a niveles directivos.", "Requiere leer y procesar cantidades masivas de texto diariamente."], areaCategory: "Humanidades", areaColor: "border-purple-500", icon: "library" },

            { id: "juegos_video", name: "Juegos de Video (Diseño y Desarrollo)", whatItDoes: "Programan, diseñan y dirigen la creación de videojuegos interactivos, desde la lógica del código hasta el arte 3D y la experiencia del jugador.", salaries: { mexico: "$25,000 MXN/mes promedio" }, pros: ["Industria que genera más dinero que el cine y la música juntos.", "Trabajo altamente creativo, divertido y en equipos multidisciplinarios.", "Posibilidad de trabajar remoto para estudios internacionales."], cons: ["Épocas de 'Crunch' (trabajar horas extras extremas antes de lanzar un juego).", "Altísima competencia global.", "Debes actualizarte en motores gráficos (Unreal, Unity) constantemente."], areaCategory: "Exactas", areaColor: "border-blue-500", icon: "gamepad-2" },

            { id: "idiomas", name: "Lenguas, Idiomas y Traducción", whatItDoes: "Dominan varios idiomas para traducir literatura, doblar películas, o interpretar discursos políticos y de negocios en tiempo real.", salaries: { mexico: "$16,000 MXN/mes promedio" }, pros: ["Oportunidad inigualable para viajar y conocer culturas.", "La interpretación simultánea (como en la ONU) es hiper emocionante.", "Gran flexibilidad; ideal para trabajar de forma remota y freelance."], cons: ["La inteligencia artificial (traductores) está quitando trabajo básico.", "La interpretación simultánea causa agotamiento cerebral extremo.", "Los sueldos como profesor de idiomas a veces son muy bajos."], areaCategory: "Humanidades", areaColor: "border-purple-500", icon: "languages" },

            { id: "psicologia", name: "Psicología Clínica y Organizacional", whatItDoes: "Estudian la mente y el comportamiento. Ayudan a pacientes a superar trastornos en terapia o a las empresas a evaluar y reclutar talento humano.", salaries: { mexico: "$16,000 MXN/mes promedio" }, pros: ["Conexión humana profunda y la satisfacción de sanar mentes.", "Carrera muy versátil (puedes estar en clínica, escuelas o corporativos).", "El campo de Recursos Humanos paga bien y tiene mucha oferta."], cons: ["Carga emocional fuerte al escuchar problemas duros y traumas ajenos.", "Para vivir bien de la clínica privada se requiere maestría y muchos pacientes.", "Gran saturación de psicólogos recién egresados."], areaCategory: "Humanidades", areaColor: "border-purple-500", icon: "users" },
            { id: "qfb", name: "Químico Farmacobiólogo (QFB)", whatItDoes: "Analizan fluidos corporales para diagnosticar enfermedades, o desarrollan, sintetizan y controlan la calidad de medicamentos e inyecciones.", salaries: { mexico: "$18,000 MXN/mes promedio" }, pros: ["Trabajo vital para la medicina; sin diagnósticos no hay curas.", "Puedes trabajar en hospitales, forense o la millonaria industria farmacéutica.", "Entorno de laboratorio limpio y controlado."], cons: ["Alta responsabilidad; un análisis mal hecho puede ser letal.", "Manejo constante de muestras infecciosas (sangre, bacterias, virus).", "En laboratorios clínicos básicos los salarios iniciales son bajos."], areaCategory: "Biológicas", areaColor: "border-emerald-500", icon: "microscope" },
            { id: "relaciones_internacionales", name: "Relaciones Internacionales y Diplomacia", whatItDoes: "Analizan la política mundial, los tratados comerciales, conflictos entre países y representan diplomáticamente a su nación o a corporativos globales.", salaries: { mexico: "$22,000 MXN/mes promedio" }, pros: ["Carrera de alto nivel intelectual e impacto macroeconómico.", "Oportunidad de trabajar en consulados, embajadas y ONGs (ONU).", "Fuerte enfoque en geopolítica, historia y economía mundial."], cons: ["Campo laboral en el sector diplomático es hiper cerrado y difícil de entrar.", "Muchos terminan trabajando en comercio exterior o logística, no en diplomacia.", "Requiere dominar mínimo 3 idiomas y mucho conocimiento histórico."], areaCategory: "Humanidades", areaColor: "border-purple-500", icon: "globe" },
            { id: "sociologia", name: "Sociología y Antropología", whatItDoes: "Estudian el comportamiento de las sociedades humanas, sus culturas, problemas urbanos, desigualdad y cómo las personas interactúan en masa.", salaries: { mexico: "$15,000 MXN/mes promedio" }, pros: ["Te da una visión profunda y crítica de cómo funciona realmente el mundo.", "Trabajo valioso en ONGs, gobierno e investigación de mercado.", "Carrera ideal para quienes buscan el activismo y cambio social."], cons: ["Alta carga teórica y de lectura crítica.", "Difícil inserción en el sector corporativo tradicional.", "Sueldos pueden ser bajos en la academia y sector público."], areaCategory: "Humanidades", areaColor: "border-purple-500", icon: "users-2" },

                            <select onchange="window.updateState('uniTypeFilter', this.value)" class="w-1/2 px-3 py-3 text-base bg-slate-50 rounded-xl border border-slate-200 outline-none text-xs text-slate-700 font-bold truncate">
                                <option value="Todas" ${state.uniTypeFilter==='Todas'?'selected':''}>Pública/Privada</option>
                                <option value="Pública" ${state.uniTypeFilter==='Pública'?'selected':''}>Pública</option>
                                <option value="Privada" ${state.uniTypeFilter==='Privada'?'selected':''}>Privada</option>
                            </select>
                            <select onchange="window.updateState('uniRegionFilter', this.value)" class="w-1/2 px-3 py-3 text-base bg-slate-50 rounded-xl border border-slate-200 outline-none text-xs text-slate-700 font-bold truncate">
                                <option value="Todas" ${state.uniRegionFilter==='Todas'?'selected':''}>Región</option>
                                <option value="Nacional" ${state.uniRegionFilter==='Nacional'?'selected':''}>Nacional (MX)</option>
                                <option value="Internacional" ${state.uniRegionFilter==='Internacional'?'selected':''}>Internacional</option>
                            </select>
                        </div>
                    </div>

                    <!-- Lista de Unis -->
                    <div>${uniCards.length > 0 ? uniCards : '<div class="text-center p-8 bg-white rounded-3xl border border-slate-200 mt-4"><i data-lucide="search" class="w-10 h-10 text-slate-300 mx-auto mb-3"></i><h3 class="text-sm font-bold text-slate-500">No hay resultados.</h3></div>'}</div>
                </div>`;
            }

            else if (state.mode === 'companies') {
                const filteredCompanies = companiesList.filter(company => {
                    const matchesSearch = company.name.toLowerCase().includes(state.searchCompany.toLowerCase());
                    const matchesIndustry = state.companyIndustryFilter === 'Todas' || company.industry === state.companyIndustryFilter;
                    return matchesSearch && matchesIndustry;
                });

                let companyCards = filteredCompanies.map((company, idx) => `
                    <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 mb-4 relative overflow-hidden transition-all">
                        <div class="absolute top-0 left-0 w-1.5 h-full ${company.color.replace('border-','bg-')}"></div>
                        <div class="pl-2">
                            <h3 class="text-lg font-black text-slate-800 leading-tight mb-1 pr-2">${company.name}</h3>
                            <div class="flex gap-2 mb-3">
                                <span class="px-2 py-0.5 bg-slate-100 text-slate-500 rounded text-[9px] font-black uppercase tracking-wider border border-slate-200">${company.industry}</span>
                                <span class="px-2 py-0.5 bg-slate-50 text-slate-400 rounded text-[9px] font-bold uppercase flex items-center border border-slate-100"><i data-lucide="map-pin" class="w-2.5 h-2.5 mr-1"></i> ${company.location}</span>
                            </div>
                            <p class="text-xs text-slate-600 font-medium leading-relaxed mb-4">${company.description}</p>
                            
                            <button onclick="window.updateState('expandedCompanyIdx', ${state.expandedCompanyIdx === idx ? null : idx})" class="w-full py-2.5 bg-slate-50 border border-slate-200 hover:bg-slate-100 text-slate-700 font-bold text-xs rounded-xl transition-transform active:scale-[0.98] flex items-center justify-center">
                                ${state.expandedCompanyIdx === idx ? 'Ocultar Puestos <i data-lucide="chevron-up" class="w-4 h-4 ml-1.5"></i>' : 'Ver Puestos Comunes <i data-lucide="chevron-down" class="w-4 h-4 ml-1.5"></i>'}
                            </button>

                            ${state.expandedCompanyIdx === idx ? `
                            <div class="mt-4 space-y-3 animate-fade-in">
                                ${company.roles.map(role => `
                                    <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
                                        <p class="text-xs font-black text-slate-800 mb-1 leading-tight">${role.title}</p>
                                        <span class="inline-block bg-emerald-50 text-emerald-700 border border-emerald-100 text-[10px] font-black px-2 py-0.5 rounded mb-2">${role.salary}</span>
                                        <div class="flex items-start">
                                            <i data-lucide="graduation-cap" class="w-3.5 h-3.5 mr-1.5 text-slate-400 shrink-0 mt-0.5"></i>
                                            <p class="text-[10px] font-bold text-slate-500 leading-relaxed">Carreras: ${role.careers.join(', ')}</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>` : ''}
                        </div>
                    </div>
                `).join('');

                content = `
                ${getTopBar('Empresas Top', 'window.goHome()')}
                <div class="p-4 max-w-lg mx-auto pb-28 animate-fade-in">

                    <!-- Tarjeta Buscador IA -->
                    <div class="bg-gradient-to-br from-rose-800 to-red-900 rounded-3xl p-5 text-white shadow-lg relative overflow-hidden mb-6">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-white opacity-10 rounded-full blur-2xl -mr-10 -mt-10 pointer-events-none"></div>
                        <h4 class="text-lg font-black mb-2 flex items-center relative z-10"><i data-lucide="sparkles" class="w-5 h-5 mr-2 text-rose-300"></i> ¿Buscas otra Empresa?</h4>
                        <p class="text-rose-100 font-medium text-xs sm:text-sm mb-4 relative z-10 leading-relaxed">Escribe su nombre y la IA te dirá qué puestos contratan y sueldos.</p>
                        
                        <div class="flex flex-col gap-3 relative z-10">
                            <input id="companyAiQuery" type="text" placeholder="Ej. Spotify, Netflix, Bimbo..." class="w-full px-4 py-3 text-base rounded-xl bg-white/10 text-white outline-none focus:bg-white/20 border border-white/20 placeholder-white/50 transition-colors" value="${state.companyAiQuery}" oninput="state.companyAiQuery=this.value; document.getElementById('btnCompanyAI').disabled=(this.value.trim()==='')" onkeydown="if(event.key === 'Enter') window.handleCompanyAISearch()">
                            <button id="btnCompanyAI" onclick="window.handleCompanyAISearch()" ${state.isCompanyAiSearching || !state.companyAiQuery.trim() ? 'disabled' : ''} class="w-full bg-rose-500 text-white py-3 rounded-xl font-black transition-transform active:scale-[0.98] disabled:opacity-50 text-sm flex justify-center items-center">
                                ${state.isCompanyAiSearching ? '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>' : 'Investigar Empresa <i data-lucide="bot" class="w-5 h-5 ml-2"></i>'}
                            </button>
                        </div>
                        ${state.companyAiError ? `<div class="mt-3 text-red-300 text-xs font-bold">${state.companyAiError}</div>` : ''}
                        ${state.companyAiResult ? `<div class="mt-4 bg-white/10 rounded-xl p-4 border border-rose-300/30 relative z-10"><div class="flex items-start"><i data-lucide="sparkles" class="w-5 h-5 mr-2 text-amber-300 shrink-0 mt-0.5"></i><div class="text-rose-50 whitespace-pre-line font-medium text-xs sm:text-sm leading-relaxed">${state.companyAiResult}</div></div></div>` : ''}
                    </div>

                    <!-- Buscador Tradicional y Filtros -->
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-200 mb-6 space-y-3">
                        <div class="relative">
                            <i data-lucide="search" class="absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                            <input id="searchCompany" type="text" placeholder="Buscar empresa..." class="w-full pl-12 pr-4 py-3 text-base bg-slate-50 rounded-xl border border-slate-200 focus:border-rose-500 font-bold text-slate-700 outline-none transition-colors" value="${state.searchCompany}" oninput="window.updateState('searchCompany', this.value)">
                        </div>
                        <select onchange="window.updateState('companyIndustryFilter', this.value)" class="w-full px-3 py-3 text-base bg-slate-50 rounded-xl border border-slate-200 outline-none text-xs text-slate-700 font-bold">
                            <option value="Todas" ${state.companyIndustryFilter==='Todas'?'selected':''}>Todas las Industrias</option>
                            <option value="Tecnología" ${state.companyIndustryFilter==='Tecnología'?'selected':''}>Tecnología</option>
                            <option value="Banca" ${state.companyIndustryFilter==='Banca'?'selected':''}>Banca y Finanzas</option>
                            <option value="Automotriz" ${state.companyIndustryFilter==='Automotriz'?'selected':''}>Automotriz</option>
                            <option value="Retail" ${state.companyIndustryFilter==='Retail'?'selected':''}>Retail y Comercio</option>
                            <option value="Alimentos" ${state.companyIndustryFilter==='Alimentos'?'selected':''}>Alimentos</option>
                        </select>
                    </div>

                    <!-- Lista de Empresas -->
                    <div>${companyCards.length > 0 ? companyCards : '<div class="text-center p-8 bg-white rounded-3xl border border-slate-200 mt-4"><i data-lucide="search" class="w-10 h-10 text-slate-300 mx-auto mb-3"></i><h3 class="text-sm font-bold text-slate-500">No hay resultados.</h3></div>'}</div>
                </div>`;
            }

            else if (state.mode === 'critical_analysis') {
                content = `
                ${getTopBar('La Cruda Verdad', 'window.goHome()')}
                <div class="p-4 max-w-lg mx-auto pb-28 animate-fade-in">
                    <div class="bg-rose-50 border border-rose-200 p-5 rounded-3xl mb-6">
                        <i data-lucide="alert-triangle" class="w-8 h-8 text-rose-500 mb-3"></i>
                        <h2 class="text-xl font-black text-rose-900 mb-2 leading-tight">Análisis sin filtros</h2>
                        <p class="text-xs text-rose-700 font-medium leading-relaxed">Las universidades te venderán la parte bonita. Aquí analizamos la realidad de la calle, los mitos comunes y por qué la gente deserta.</p>
                    </div>

                    <div class="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm mb-6">
                        <h3 class="text-sm font-black text-slate-800 mb-3">¿De qué carrera quieres saber la verdad?</h3>
                        <div class="relative mb-3">
                            <input id="criticalAiQuery" type="text" placeholder="Ej. Medicina, Arquitectura..." class="w-full px-4 py-3 text-base bg-slate-50 rounded-xl border border-slate-200 focus:border-rose-500 font-bold text-slate-700 outline-none transition-colors" value="${state.criticalAiQuery}" oninput="state.criticalAiQuery=this.value; document.getElementById('btnCriticalAI').disabled=(this.value.trim()==='')" onkeydown="if(event.key === 'Enter') window.handleCriticalAISearch()">
                        </div>
                        <button id="btnCriticalAI" onclick="window.handleCriticalAISearch()" ${state.isCriticalAiSearching || !state.criticalAiQuery.trim() ? 'disabled' : ''} class="w-full bg-rose-500 text-white py-3 rounded-xl font-black transition-transform active:scale-[0.98] disabled:opacity-50 text-sm flex justify-center items-center">
                            ${state.isCriticalAiSearching ? '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>' : 'Analizar Realidad <i data-lucide="search" class="w-5 h-5 ml-2"></i>'}
                        </button>
                    </div>

                    ${state.criticalAiError ? `<div class="bg-rose-50 text-rose-600 p-4 rounded-2xl text-xs font-bold border border-rose-200 mb-6">${state.criticalAiError}</div>` : ''}

                    ${state.criticalAiResult ? `
                    <div class="space-y-4 animate-fade-in">
                        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1.5 h-full bg-amber-400"></div>
                            <h4 class="font-black text-slate-800 mb-2 flex items-center text-xs uppercase tracking-wide ml-2"><i data-lucide="message-circle" class="w-4 h-4 mr-1.5 text-amber-500"></i> Lo que todos creen (El Mito)</h4>
                            <p class="text-sm text-slate-600 font-medium leading-relaxed ml-2">${state.criticalAiResult.suposicion}</p>
                        </div>
                        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1.5 h-full bg-emerald-500"></div>
                            <h4 class="font-black text-slate-800 mb-2 flex items-center text-xs uppercase tracking-wide ml-2"><i data-lucide="eye" class="w-4 h-4 mr-1.5 text-emerald-500"></i> La Realidad (El Contraargumento)</h4>
                            <p class="text-sm text-slate-600 font-medium leading-relaxed ml-2">${state.criticalAiResult.contraargumento}</p>
                        </div>
                        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1.5 h-full bg-rose-500"></div>
                            <h4 class="font-black text-slate-800 mb-2 flex items-center text-xs uppercase tracking-wide ml-2"><i data-lucide="x-circle" class="w-4 h-4 mr-1.5 text-rose-500"></i> Por qué la gente renuncia (Fallo)</h4>
                            <p class="text-sm text-slate-600 font-medium leading-relaxed ml-2">${state.criticalAiResult.fallo_comun}</p>
                        </div>
                    </div>
                    ` : ''}
                </div>`;
            }

            else if (state.mode === 'ai_character') {
                content = `
                ${getTopBar('Personaje de Ficción', 'window.goHome()')}
                <div class="p-4 max-w-lg mx-auto pb-28 animate-fade-in">
                    <div class="bg-slate-900 text-white p-6 rounded-3xl mb-6 shadow-lg relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-purple-500 opacity-20 rounded-full blur-2xl -mr-10 -mt-10 pointer-events-none"></div>
                        <i data-lucide="message-square" class="w-8 h-8 text-purple-400 mb-3 relative z-10"></i>
                        <h2 class="text-xl font-black mb-2 leading-tight relative z-10">Habla con tus ídolos</h2>
                        <p class="text-xs text-slate-300 font-medium leading-relaxed relative z-10">Escribe el nombre de un personaje (ej. Iron Man, Dr. House, Harvey Specter) y pregúntale consejos sobre su profesión.</p>
                    </div>

                    <div class="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm mb-6 space-y-4">
                        <div>
                            <label class="text-xs font-black text-slate-800 mb-1.5 block uppercase tracking-wide">Personaje</label>
                            <input id="characterNameIA" type="text" placeholder="Ej. Batman, Elle Woods..." class="w-full px-4 py-3 text-base bg-slate-50 rounded-xl border border-slate-200 focus:border-purple-500 font-bold text-slate-700 outline-none transition-colors" value="${state.characterNameIA}" oninput="state.characterNameIA=this.value; var b=document.getElementById('btnCharacterAI'); if(b) b.disabled=(!this.value.trim()||!state.characterQuery.trim())">
                        </div>
                        <div>
                            <label class="text-xs font-black text-slate-800 mb-1.5 block uppercase tracking-wide">Tu Pregunta</label>
                            <textarea id="characterQuery" rows="3" placeholder="Ej. ¿Vale la pena estudiar criminología?" class="w-full px-4 py-3 text-base bg-slate-50 rounded-xl border border-slate-200 focus:border-purple-500 font-bold text-slate-700 outline-none transition-colors resize-none" oninput="state.characterQuery=this.value; var b=document.getElementById('btnCharacterAI'); if(b) b.disabled=(!state.characterNameIA.trim()||!this.value.trim())">${state.characterQuery}</textarea>
                        </div>
                        <button id="btnCharacterAI" onclick="window.handleCharacterAISearch()" ${state.isCharacterAiSearching || !state.characterQuery.trim() || !state.characterNameIA.trim() ? 'disabled' : ''} class="w-full bg-purple-600 text-white py-3 rounded-xl font-black transition-transform active:scale-[0.98] disabled:opacity-50 text-sm flex justify-center items-center mt-2 shadow-md shadow-purple-200">
                            ${state.isCharacterAiSearching ? '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>' : 'Enviar Mensaje <i data-lucide="send" class="w-4 h-4 ml-2"></i>'}
                        </button>
                    </div>

                    ${state.aiError ? `<div class="bg-rose-50 text-rose-600 p-4 rounded-2xl text-xs font-bold border border-rose-200 mb-6">${state.aiError}</div>` : ''}

                    ${state.aiCharacterResults ? `
                    <div class="bg-slate-100 p-5 rounded-3xl relative border border-slate-200 animate-fade-in shadow-inner">
                        <div class="absolute -top-3 -left-3 bg-white p-2 rounded-full border border-slate-200 shadow-sm"><i data-lucide="bot" class="w-5 h-5 text-purple-600"></i></div>
                        <p class="text-sm text-slate-700 font-medium leading-relaxed italic">"${state.aiCharacterResults}"</p>
                    </div>
                    ` : ''}
                </div>`;
            }

            return content + (state.mode !== 'quiz' || state.quizStep === 12 ? getBottomNavBar() : '');
        }

        const render = () => {
            const activeId = document.activeElement?.id;
            const selStart = document.activeElement?.selectionStart;
            const selEnd = document.activeElement?.selectionEnd;
            const root = document.getElementById('root');
            root.innerHTML = getAppHTML();
            lucide.createIcons();
            if (activeId) {
                const el = document.getElementById(activeId);
                if (el) {
                    el.focus();
                    try { el.setSelectionRange(selStart, selEnd); } catch(e) {}
                }
            }
        };

        // Initialize app
        window.onload = () => {
            render();
        };
    </script>
</body>
</html>
